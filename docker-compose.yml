version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: silenttransfer-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: silenttransfer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: silenttransfer-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      API_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/silenttransfer
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
