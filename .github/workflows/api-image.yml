name: API image (GHCR)

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-image.yml"
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/silenttransfer-api:live-relayer
            ghcr.io/${{ github.repository_owner }}/silenttransfer-api:latest
