name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npx hardhat compile
      - run: npm test

  api:
    name: API Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r requirements.txt
      - name: Lint (if available)
        run: |
          pip install ruff
          ruff check . || echo "Ruff linting issues found (non-blocking)"
        continue-on-error: true
      - name: Test
        run: |
          pip install pytest httpx
          pytest || echo "No tests found or tests failed (non-blocking)"
        continue-on-error: true
        env:
          API_DEMO_MODE: "true"
          API_DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          API_JWT_SECRET: "ci-test-secret"
          API_CORS_ORIGINS: "http://localhost:3000"
          API_SIWE_DOMAIN: "localhost:3000"
          API_SIWE_URI: "http://localhost:3000"

  web:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint || echo "Lint issues found (non-blocking)"
        continue-on-error: true
      - name: TypeScript Type Check
        run: npx tsc --noEmit || echo "Type errors found (non-blocking)"
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_CHAIN_ID: "1337"
          NEXT_PUBLIC_SIWE_DOMAIN: "localhost:3000"
          NEXT_PUBLIC_SIWE_URI: "http://localhost:3000"
          NEXT_PUBLIC_RPC_URL: ""
          NEXT_PUBLIC_REGISTRY_ADDRESS: ""
          NEXT_PUBLIC_MESSENGER_ADDRESS: ""
